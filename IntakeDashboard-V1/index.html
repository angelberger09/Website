<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IntakeDashboard-V1</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000000'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%234ADE80'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: #050505;
        --line: #2a2a2a;
        --line-soft: #171717;
        --text: #f5f5f5;
        --muted: #9a9a9a;
        --green: #4ade80;
        --green-strong: #22c55e;
        --danger: #ff8d8d;
        --control: #070707;
        --topbar-h: clamp(56px, 7vh, 72px);
        --pane-pad-x: clamp(16px, 2.85vw, 44px);
        --pane-pad-y: clamp(16px, 2.75vh, 28px);
        --gap: clamp(12px, 2.1vh, 22px);
        --review-gap: clamp(18px, 5.3vh, 54px);
        --control-h: clamp(40px, 4.7vh, 48px);
        font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(74, 222, 128, 0.12), transparent 26%),
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.045), transparent 42%),
          radial-gradient(circle at 50% 50%, rgba(74, 222, 128, 0.07), rgba(0, 0, 0, 0) 54%),
          #000;
        color: var(--text);
      }

      button, select, textarea {
        font: inherit;
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: var(--topbar-h) minmax(0, 1fr);
        border: 1px solid var(--line);
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255,255,255,0.018) 1px, transparent 1px),
          #000;
        background-size: 80px 80px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(240px, clamp(320px, 24.4vw, 374px)) minmax(220px, 1fr);
        align-items: center;
        gap: clamp(12px, 1.2vw, 18px);
        padding: 0 clamp(14px, 1.3vw, 20px);
        border-bottom: 1px solid var(--line);
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0) 52%),
          linear-gradient(180deg, rgba(18, 18, 18, 0.98), rgba(4, 4, 4, 0.96));
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: clamp(10px, 1.2vw, 18px);
        min-width: 0;
      }

      .brand-title {
        font-size: clamp(14px, 1.12vw, 17px);
        font-weight: 700;
        line-height: 1;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: clamp(6px, 0.55vw, 8px);
        color: var(--green);
        font-size: clamp(14px, 1.05vw, 16px);
        white-space: nowrap;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: currentColor;
      }

      .entry-picker {
        display: grid;
      }

      select {
        width: 100%;
        min-height: clamp(40px, 4.4vh, 45px);
        color: var(--text);
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 60%),
          linear-gradient(180deg, rgba(12, 12, 12, 0.96), rgba(4, 4, 4, 0.98));
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 clamp(34px, 2.8vw, 42px) 0 clamp(14px, 1.2vw, 18px);
        font-size: clamp(14px, 1.12vw, 17px);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      #decision {
        color: var(--green);
      }

      .top-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: clamp(10px, 1.45vw, 22px);
        color: var(--text);
      }

      .host {
        font-size: clamp(14px, 1.12vw, 17px);
        letter-spacing: 0.02em;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: clamp(30px, 2.25vw, 34px);
        height: clamp(30px, 2.25vw, 34px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        background:
          radial-gradient(circle at 50% 25%, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.01) 56%),
          linear-gradient(180deg, rgba(18, 18, 18, 0.95), rgba(6, 6, 6, 0.96));
        cursor: pointer;
        border-radius: 4px;
        box-shadow:
          0 10px 20px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .icon-button:hover {
        background:
          radial-gradient(circle at 50% 25%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02) 60%),
          linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(8, 8, 8, 0.98));
      }

      .doc-status {
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(420px, 0.85fr);
        min-height: 0;
        overflow: hidden;
        height: 100%;
      }

      .preview-pane,
      .review-pane {
        min-width: 0;
        min-height: 0;
        padding: var(--pane-pad-y) clamp(16px, 1.6vw, 24px);
      }

      .preview-pane {
        position: relative;
        border-right: 1px solid rgba(255, 255, 255, 0.07);
        height: 100%;
        overflow: hidden;
        padding: 5px;
      }

      .review-pane {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: var(--review-gap);
        padding: 5px;
        overflow-y: auto;
        overflow-x: hidden;
        height: 100%;
      }

      .section-label {
        margin: 0;
        font-size: clamp(12px, 0.92vw, 14px);
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .preview-head {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: clamp(12px, 1.4vw, 20px);
        pointer-events: none;
      }

      .preview-head .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.02) 60%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.56));
        padding: 6px 12px;
        border-radius: 6px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
      }

      .aspect-picker {
        display: grid;
        gap: 8px;
        min-width: min(100%, 320px);
      }

      .aspect-picker label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .aspect-picker select {
        min-height: clamp(40px, 4.4vh, 45px);
      }

      .preview-head .aspect-picker {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .preview-head .aspect-picker label {
        display: none;
      }

      .preview-head .aspect-picker select {
        min-height: 32px;
        height: 32px;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02) 60%),
          linear-gradient(180deg, rgba(18, 18, 18, 0.95), rgba(4, 4, 4, 0.98));
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--text);
        border-radius: 6px;
        padding: 0 28px 0 12px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        transition: all 0.2s ease;
      }

      .preview-head .aspect-picker select:hover {
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02) 60%),
          linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(8, 8, 8, 0.98));
        border-color: rgba(255, 255, 255, 0.25);
      }

      .preview-frame-wrap {
        position: relative;
        min-height: 0;
        height: 100%;
        border: 0;
        border-radius: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 42%, rgba(74, 222, 128, 0.08), transparent 28%),
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 52%),
          #000;
        display: grid;
        place-items: center;
        padding: 0;
      }

      .preview-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        width: auto;
        height: auto;
        transform: translate(-50%, -50%);
        background: #000;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
        overflow: hidden;
        border-radius: 12px;
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        max-width: 100%;
        max-height: 100%;
        border: 0;
        background: #fff;
      }

      .empty-state {
        display: grid;
        place-items: center;
        height: 100%;
        min-height: 0;
        color: var(--muted);
        border: 1px dashed var(--line);
      }

      .review-card {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: clamp(10px, 1.2vh, 14px);
      }

      .review-title {
        margin: 0;
        font-size: clamp(28px, 2.9vw, 44px);
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: clamp(8px, 0.78vw, 12px);
        margin-top: clamp(10px, 1.5vh, 14px);
        padding: clamp(6px, 0.78vh, 8px) clamp(10px, 0.85vw, 13px);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.055);
        color: var(--text);
        font-size: clamp(12px, 0.92vw, 14px);
        font-weight: 800;
        text-transform: uppercase;
      }

      .tag-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
      }

      .review-block {
        display: grid;
        gap: 12px;
      }

      .reference-block {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .review-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .review-block h3 {
        margin: 0;
        font-size: clamp(15px, 1.1vw, 18px);
        font-weight: 700;
      }

      .attach-button,
      .save-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: clamp(42px, 4.8vh, 48px);
        padding: 0 clamp(16px, 1.8vw, 22px);
        border-radius: 8px;
        border: 1px solid var(--line);
        cursor: pointer;
        font-weight: 800;
        letter-spacing: 0.01em;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      .attach-button {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
      }

      .save-button {
        color: #06120a;
        background: linear-gradient(180deg, #68ef8a, #37d364);
        border-color: transparent;
        min-width: min(100%, 220px);
      }

      .attach-button:hover,
      .save-button:hover {
        transform: translateY(-1px);
      }

      .review-panel-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .attachment-gallery {
        display: grid;
        gap: 12px;
      }

      .attachment-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }

      .attachment-card {
        display: grid;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .attachment-thumb {
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
        border-radius: 8px;
        overflow: hidden;
        background: #060606;
        border: 1px solid var(--line-soft);
      }

      .attachment-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .attachment-name {
        font-size: 12px;
        color: var(--text);
        line-height: 1.35;
        word-break: break-word;
      }

      .attachment-note {
        width: 100%;
        min-height: 74px;
        resize: vertical;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(0, 0, 0, 0.82);
        line-height: 1.45;
      }

      .attachment-note::placeholder {
        color: #8d8d8d;
      }

      .empty-gallery {
        padding: 16px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .reference-editor {
        width: 100%;
        min-height: 0;
        flex: 1;
        overflow: auto;
        padding: 0;
        border: 0;
        border-radius: 0;
        color: var(--text);
        background: transparent;
        line-height: 1.55;
        outline: none;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .reference-editor::placeholder {
        color: #8d8d8d;
      }

      .reference-editor:empty::before {
        content: attr(data-placeholder);
        color: #8d8d8d;
        pointer-events: none;
      }

      .reference-editor h1,
      .reference-editor h2,
      .reference-editor h3,
      .reference-editor p {
        margin: 0 0 0.85em;
      }

      .reference-editor img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0.85em 0;
        border-radius: 8px;
      }

      .review-copy,
      .feedback-list {
        color: var(--text);
        font-size: clamp(14px, 1.05vw, 16px);
        line-height: clamp(1.55, 1.86vw, 1.9);
      }

      .review-copy {
        max-width: 620px;
      }

      .feedback-list {
        margin: 0;
        padding-left: 24px;
      }

      .reference-chips {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .reference-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(420px, 0.85fr);
        min-height: 0;
        overflow: hidden;
        height: 100%;
      }

      .preview-pane,
      .review-pane {
        min-width: 0;
        min-height: 0;
        padding: clamp(14px, 1.8vw, 24px);
      }

      .preview-pane {
        position: relative;
        border-right: 1px solid rgba(255, 255, 255, 0.07);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.01);
        height: 100%;
      }

      .review-pane {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: clamp(12px, 2vh, 18px);
        overflow: hidden;
        height: 100%;
      }

      .section-label {
        margin: 0;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: clamp(12px, 1.8vh, 16px);
      }

      .aspect-picker {
        display: grid;
        gap: 6px;
        min-width: min(100%, 320px);
      }

      .aspect-picker label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .aspect-picker select {
        min-height: 40px;
      }

      .preview-frame-wrap {
        position: relative;
        height: calc(100% - 56px);
        min-height: 320px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 42%, rgba(74, 222, 128, 0.08), transparent 28%),
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 52%),
          #000;
        display: grid;
        place-items: center;
        padding: 0;
      }

      .preview-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        width: auto;
        height: auto;
        transform: translate(-50%, -50%);
        background: #000;
        overflow: hidden;
        border-radius: 12px;
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        max-width: 100%;
        max-height: 100%;
        border: 0;
        background: #fff;
      }

      .empty-state {
        display: grid;
        place-items: center;
        height: 100%;
        min-height: 0;
        color: var(--muted);
        border: 1px dashed var(--line);
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        border-radius: 12px;
      }

      .review-card {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: 12px;
      }

      .review-block {
        display: grid;
        gap: 12px;
      }

      .reference-block {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
      }

      .reference-editor {
        width: 100%;
        min-height: 0;
        height: 100%;
        flex: 1;
        overflow: auto;
        padding: 18px 18px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        color: var(--text);
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01) 60%),
          linear-gradient(180deg, rgba(14, 14, 14, 0.9), rgba(4, 4, 4, 0.96));
        line-height: 1.65;
        outline: none;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 16px;
        resize: none;
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .reference-editor::placeholder {
        color: #8d8d8d;
      }

      @media (max-width: 760px) {
        .app {
          height: auto;
          min-height: 100dvh;
          grid-template-rows: auto 1fr;
          overflow: visible;
        }

        .topbar {
          grid-template-columns: 1fr;
          padding: clamp(12px, 4vw, 16px);
        }

        .top-actions {
          justify-content: space-between;
        }
        .workspace {
          grid-template-columns: 1fr;
          overflow: visible;
        }

        .preview-pane {
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .review-pane {
          overflow: visible;
        }

        .preview-frame-wrap {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">IntakeDashboard-V1</div>
          <div class="status" id="status"><span class="status-dot"></span><span>Ready</span></div>
        </div>

        <div class="entry-picker">
          <select id="entrySelect" aria-label="Review entry"></select>
        </div>

        <div class="top-actions">
          <div class="host" id="hostLabel">127.0.0.1:3011</div>
          <div class="doc-status" id="autosaveStatus">Saved</div>
          <button class="icon-button" id="refreshEntries" title="Refresh entries" aria-label="Refresh entries">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
          </button>
        </div>
      </header>

      <section class="workspace">
        <section class="preview-pane" aria-label="Sandbox preview">
          <div class="preview-head">
            <h2 class="section-label">Play (Sandbox Preview)</h2>
            <div class="aspect-picker">
              <label for="previewAspect">Device Aspect Ratio</label>
              <select id="previewAspect" aria-label="Device aspect ratio">
                <option value="16:9">Desktop Monitor 16:9</option>
                <option value="16:10">Laptop 16:10</option>
                <option value="21:9">Ultrawide 21:9</option>
                <option value="32:9">Super Ultrawide 32:9</option>
                <option value="4:3">Classic Display 4:3</option>
                <option value="3:2">Widescreen 3:2</option>
                <option value="1:1">Square 1:1</option>
                <option value="3:4">Tablet Portrait 3:4</option>
                <option value="4:5">Social Portrait 4:5</option>
                <option value="9:16">Mobile Portrait 9:16</option>
                <option value="10:16">Tall Phone 10:16</option>
                <option value="2.39:1">Cinema 2.39:1</option>
              </select>
            </div>
          </div>
          <div class="preview-frame-wrap">
            <div class="preview-stage" id="previewStage">
              <iframe
                id="preview"
                class="preview-frame"
                sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
                title="Website preview"
              ></iframe>
              <div class="empty-state" id="emptyState" hidden>No review entries found in ReviewTargets.</div>
            </div>
          </div>
        </section>

        <section class="review-pane" aria-label="Review and feedback">
          <div class="review-card">
            <div class="review-block reference-block">
              <textarea
                id="referenceBody"
                class="reference-editor"
                placeholder="Write the review here. It is one multiline document with live autosave."
                aria-label="Review document"
              ></textarea>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const status = document.getElementById("status");
      const preview = document.getElementById("preview");
      const entrySelect = document.getElementById("entrySelect");
      const refreshEntries = document.getElementById("refreshEntries");
      const autosaveStatus = document.getElementById("autosaveStatus");
      const referenceBody = document.getElementById("referenceBody");
      const emptyState = document.getElementById("emptyState");
      const previewAspect = document.getElementById("previewAspect");
      const previewStage = document.getElementById("previewStage");
      const hostLabel = document.getElementById("hostLabel");

      if (hostLabel) hostLabel.textContent = window.location.host;

      let selectedEntry = "";
      let dirty = false;
      let autosaveTimer = null;
      let saveInFlight = false;
      let lastSavedText = "";
      const aspectRatios = new Map([
        ["16:9", { w: 1920, h: 1080 }],
        ["16:10", { w: 1440, h: 900 }],
        ["21:9", { w: 2560, h: 1080 }],
        ["32:9", { w: 3840, h: 1080 }],
        ["4:3", { w: 1024, h: 768 }],
        ["3:2", { w: 1440, h: 960 }],
        ["1:1", { w: 1080, h: 1080 }],
        ["3:4", { w: 768, h: 1024 }],
        ["4:5", { w: 1080, h: 1350 }],
        ["9:16", { w: 390, h: 844 }],
        ["10:16", { w: 800, h: 1280 }],
        ["2.39:1", { w: 2560, h: 1071 }],
      ]);
      const defaultPreviewAspect = "16:9";

      function setStatus(message, tone = "good") {
        status.innerHTML = `<span class="status-dot"></span><span>${message}</span>`;
        status.style.color = tone === "bad" ? "var(--danger)" : "var(--green)";
      }

      function titleFromEntry(entry) {
        if (!entry) return "No Entry Selected";
        const normalized = String(entry).replace(/[\\/]+$/, "");
        let name = normalized.split("/").pop() || normalized;
        if (normalized.toLowerCase().endsWith("/index.html")) {
          name = normalized.slice(0, -"index.html".length - 1).split("/").pop() || "index";
        } else {
          name = name.replace(/\.html$/i, "");
        }
        return name
          .split(/[-_ ]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function resetReferenceDraft(entry) {
        if (referenceBody) {
          referenceBody.value = "";
        }
      }

      function normalizeDraftText(value) {
        const raw = String(value || "");
        if (!/[<][a-z!/]/i.test(raw)) return raw.replace(/\r\n/g, "\n");
        const doc = new DOMParser().parseFromString(raw, "text/html");
        return (doc.body?.innerText || doc.body?.textContent || raw).replace(/\r\n/g, "\n").trimEnd();
      }

      function fitPreviewStage() {
        const aspectKey = previewAspect?.value || defaultPreviewAspect;
        const aspectObj = aspectRatios.get(aspectKey) || aspectRatios.get(defaultPreviewAspect) || { w: 1920, h: 1080 };
        if (!previewStage || !previewStage.parentElement) return;

        const shell = previewStage.parentElement;
        const style = window.getComputedStyle(shell);
        const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);

        const shellWidth = shell.clientWidth - padX;
        const shellHeight = shell.clientHeight - padY;
        if (shellWidth <= 0 || shellHeight <= 0) return;

        const ratio = aspectObj.w / aspectObj.h;
        let targetW = shellWidth;
        let targetH = targetW / ratio;
        if (targetH > shellHeight) {
          targetH = shellHeight;
          targetW = targetH * ratio;
        }

        previewStage.style.width = `${Math.floor(targetW)}px`;
        previewStage.style.height = `${Math.floor(targetH)}px`;
        previewStage.style.transform = "translate(-50%, -50%)";
      }

      function setAutosaveStatus(message, tone = "good") {
        if (!autosaveStatus) return;
        autosaveStatus.textContent = message;
        autosaveStatus.style.color = tone === "bad" ? "var(--danger)" : "var(--green)";
      }

      function scheduleAutosave() {
        dirty = true;
        setAutosaveStatus("Unsaved");
        if (autosaveTimer) window.clearTimeout(autosaveTimer);
        autosaveTimer = window.setTimeout(() => {
          autosaveTimer = null;
          void autosaveNow();
        }, 700);
      }

      async function autosaveNow() {
        if (!selectedEntry || saveInFlight || !dirty) return;
        const text = referenceBody ? referenceBody.value : "";
        if (!text || text === lastSavedText) {
          dirty = false;
          setAutosaveStatus("Saved");
          return;
        }

        saveInFlight = true;
        setAutosaveStatus("Saving...");

        try {
          const res = await fetch("/api/autosave", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              entry: selectedEntry,
              title: titleFromEntry(selectedEntry),
              referenceMd: text,
            }),
          });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || "Failed to autosave packet.");

          if (referenceBody && typeof data.referenceMd === "string") {
            referenceBody.value = normalizeDraftText(data.referenceMd);
          }

          lastSavedText = referenceBody ? referenceBody.value : text;
          dirty = false;
          setAutosaveStatus("Saved");
        } catch (error) {
          setAutosaveStatus("Save failed", "bad");
        } finally {
          saveInFlight = false;
        }
      }

      async function loadDraft(entry) {
        const res = await fetch(`/api/draft?entry=${encodeURIComponent(entry)}`, { cache: "no-store" });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to load draft.");
        return data.draft;
      }

      function setEntry(entry) {
        selectedEntry = entry || "";
        const hasEntry = Boolean(selectedEntry);
        preview.hidden = !hasEntry;
        if (emptyState) emptyState.hidden = hasEntry;

        if (!hasEntry) {
          preview.removeAttribute("src");
          if (referenceBody) referenceBody.value = "";
          lastSavedText = "";
          dirty = false;
          setAutosaveStatus("Ready");
          return;
        }

        const previewUrl = `/preview?entry=${encodeURIComponent(selectedEntry)}`;
        preview.src = previewUrl;
        setAutosaveStatus("Loading...");
        void (async () => {
          try {
            const draft = await loadDraft(selectedEntry);
            if (referenceBody) {
              referenceBody.value = draft?.referenceMd ? normalizeDraftText(draft.referenceMd) : "";
              if (!referenceBody.value) resetReferenceDraft(selectedEntry);
              lastSavedText = referenceBody.value;
              dirty = false;
              setAutosaveStatus("Saved");
            }
          } catch {
            resetReferenceDraft(selectedEntry);
            lastSavedText = referenceBody ? referenceBody.value : "";
            dirty = false;
            setAutosaveStatus("Ready");
          } finally {
            fitPreviewStage();
          }
        })();
      }

      async function loadEntries() {
        setStatus("Scanning...");
        entrySelect.disabled = true;
        refreshEntries.disabled = true;

        try {
          const res = await fetch("/api/entries", { cache: "no-store" });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || "Failed to scan entries.");

          entrySelect.innerHTML = "";
          data.entries.forEach((entry) => {
            const option = document.createElement("option");
            option.value = entry.path;
            option.textContent = entry.label;
            entrySelect.appendChild(option);
          });

          entrySelect.disabled = data.entries.length === 0;
          setEntry(data.entries[0]?.path || "");
          setStatus("Ready");
        } catch (error) {
          setStatus("Error", "bad");
          setEntry("");
        } finally {
          refreshEntries.disabled = false;
        }
      }

      entrySelect.addEventListener("change", () => setEntry(entrySelect.value));
      refreshEntries.addEventListener("click", loadEntries);
      referenceBody.addEventListener("input", () => {
        scheduleAutosave();
      });
      previewAspect.addEventListener("change", fitPreviewStage);
      previewAspect.addEventListener("change", () => {
        localStorage.setItem("previewAspect", previewAspect.value);
      });
      window.addEventListener("resize", fitPreviewStage);
      new ResizeObserver(fitPreviewStage).observe(previewStage.parentElement);

      window.addEventListener("beforeunload", (event) => {
        if (!dirty) return;
        event.preventDefault();
        event.returnValue = "";
      });

      {
        const savedAspect = localStorage.getItem("previewAspect");
        const nextAspect = savedAspect && aspectRatios.has(savedAspect) ? savedAspect : defaultPreviewAspect;
        previewAspect.value = nextAspect;
      }

      fitPreviewStage();
      loadEntries();
    </script>
  </body>
</html>
