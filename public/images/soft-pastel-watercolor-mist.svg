<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Soft pastel watercolor gradient background">
  <defs>
    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="4" seed="18" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
    <radialGradient id="creamGlow" cx="25%" cy="10%" r="70%">
      <stop offset="0" stop-color="#fff6dc" />
      <stop offset="0.48" stop-color="#f6efe4" stop-opacity="0.72" />
      <stop offset="1" stop-color="#f6efe4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sageWash" cx="78%" cy="8%" r="62%">
      <stop offset="0" stop-color="#a8b79a" stop-opacity="0.88" />
      <stop offset="0.55" stop-color="#cfd8bd" stop-opacity="0.44" />
      <stop offset="1" stop-color="#cfd8bd" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="coralBloom" cx="78%" cy="56%" r="58%">
      <stop offset="0" stop-color="#ffb08f" stop-opacity="0.86" />
      <stop offset="0.58" stop-color="#ffd5b8" stop-opacity="0.48" />
      <stop offset="1" stop-color="#ffd5b8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="lavenderMist" cx="10%" cy="68%" r="55%">
      <stop offset="0" stop-color="#c8b6d9" stop-opacity="0.76" />
      <stop offset="0.62" stop-color="#e1d4e8" stop-opacity="0.44" />
      <stop offset="1" stop-color="#e1d4e8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueHaze" cx="38%" cy="96%" r="62%">
      <stop offset="0" stop-color="#9eb6d9" stop-opacity="0.68" />
      <stop offset="0.58" stop-color="#c9d7e4" stop-opacity="0.42" />
      <stop offset="1" stop-color="#c9d7e4" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="#f6efe4" />
  <g filter="url(#softNoise)">
    <rect width="1200" height="1200" fill="url(#creamGlow)" />
    <rect width="1200" height="1200" fill="url(#sageWash)" />
    <rect width="1200" height="1200" fill="url(#coralBloom)" />
    <rect width="1200" height="1200" fill="url(#lavenderMist)" />
    <rect width="1200" height="1200" fill="url(#blueHaze)" />
  </g>
</svg>
