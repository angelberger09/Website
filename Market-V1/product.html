<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market-V1 Product</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23070f16'/%3E%3Cpath d='M8 22h16V10H8z' fill='%2378d2ff'/%3E%3Cpath d='M11 13h10v2H11zm0 4h7v2h-7z' fill='%2306111a'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./assets/css/main.css?v=5" />
  </head>
  <body>
    <main class="product-page">
      <a class="back-link" href="./">Back to Market-V1</a>
      <article class="product-page-card" id="productPageCard">
        <div class="product-page-media product-art">
          <img id="productPageImage" alt="" />
        </div>
        <div class="product-page-copy">
          <h1 id="productPageTitle"></h1>
          <div class="meta-row">
            <span class="price" id="productPagePrice"></span>
            <span class="rating" id="productPageRating"></span>
            <span id="productPageShipping"></span>
          </div>
          <p id="productPageDescription"></p>
          <ul class="detail-points" id="productPageHighlights"></ul>
          <div class="page-actions">
            <button id="addToCartButton" type="button">Add to cart</button>
          </div>
        </div>
      </article>
    </main>
    <script type="module" src="./assets/js/product.js?v=3"></script>
  </body>
</html>
