<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#111; }
  .scene { position:relative; width:min(100vw,1024px); aspect-ratio:1024/559; overflow:hidden; }
  .scene img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .base { filter:saturate(.9) brightness(.9); }
  .mountains { transform:translateY(var(--mountain-y,0px)); }
  .lilacs { transform:translateY(var(--lilac-y,0px)) scale(var(--lilac-scale,1)); transform-origin:center; }
</style>
</head>
<body>
  <div class="scene">
    <img class="base" src="../1a7eb36a-cc68-4ea4-8732-c2864cd5614e.png" />
    <img class="mountains" src="mountains_land_cutout.png" />
    <img class="lilacs" src="lilacs_cutout.png" />
  </div>
</body>
</html>
