    <stop offset="0.38" stop-color="#ffffff" stop-opacity="0.08"/>
    <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.62"/>
    <stop offset="0.62" stop-color="#fffaf2" stop-opacity="0.12"/>
