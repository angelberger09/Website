<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-label="Wide torn cream paper with tape on black background">
  <defs>
    <filter id="paperNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.62" numOctaves="5" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.92 0 0 0 0 0.88 0 0 0 0 0.78 0 0 0 .34 0" result="paperTone"/>
