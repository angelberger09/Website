<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-label="Cream paper polaroid frame over muted purple backing on black background">
  <defs>
    <filter id="paperNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.52" numOctaves="5" seed="93" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.88 0 0 0 0 0.82 0 0 0 0 0.70 0 0 0 .34 0" result="tone"/>
      <feComposite in="tone" in2="SourceGraphic" operator="in" result="texture"/>
