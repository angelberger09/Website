<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A4. Sand Ripples</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        --ink: #f5f5f5;
        --muted: #a8a8a8;
        --line: rgba(255, 255, 255, 0.22);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 48% 54%, rgba(33, 50, 55, 0.28), transparent 34%),
          radial-gradient(circle at 20% 28%, rgba(255, 255, 255, 0.04), transparent 20%),
          #000;
      }

      .board {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 620px;
      }

      .tip {
        position: absolute;
        top: 8%;
        left: 42%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        color: #d8d8d8;
        background: rgba(0, 0, 0, 0.64);
      }

      .tip::after {
        content: "";
        position: absolute;
        left: 46%;
        bottom: -10px;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-top: 10px solid rgba(255, 255, 255, 0.12);
      }

      .slot {
        position: absolute;
        width: 158px;
        height: 132px;
        border: 1px dashed rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        color: #dedede;
        padding: 45px 20px;
      }

      .slot strong {
        display: block;
        font-size: 20px;
        font-weight: 400;
      }

      .slot span {
        display: block;
        margin-top: 8px;
        color: #bdbdbd;
        font-size: 18px;
      }

      .slot.origins { top: 18%; left: 42%; }
      .slot.tools { top: 57%; left: 32%; width: 126px; height: 98px; padding: 26px 18px; }
      .slot.life { top: 57%; right: 5%; width: 136px; height: 98px; padding: 26px 18px; }
      .slot.expression { bottom: 7%; right: 5%; width: 156px; height: 110px; padding: 28px 18px; }

      .polaroid {
        position: absolute;
        width: 198px;
        padding: 10px 10px 18px;
        color: #000;
        background: #f2f2f2;
        box-shadow: 0 14px 26px rgba(0, 0, 0, 0.48);
      }

      .polaroid img {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 0.9;
        object-fit: cover;
        margin-bottom: 12px;
        filter: saturate(0.82) contrast(1.04);
      }

      .polaroid strong {
        display: block;
        font-size: 14px;
        line-height: 1.15;
      }

      .polaroid span {
        display: block;
        margin-top: 6px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .sand {
        top: 14%;
        left: 11%;
        transform: rotate(-6deg);
      }

      .fossil {
        top: 23%;
        right: 11%;
        transform: rotate(7deg);
      }

      .obsidian {
        bottom: 20%;
        left: 7%;
        transform: rotate(-6deg);
      }

      .cave {
        bottom: 11%;
        left: 51%;
        transform: rotate(8deg);
      }

      .arrow {
        position: absolute;
        left: 40%;
        top: 39%;
        width: 150px;
        height: 78px;
        border-bottom: 2px solid #fff;
        border-radius: 0 0 100% 0;
        transform: rotate(13deg);
      }

      .arrow::after {
        content: "";
        position: absolute;
        right: -6px;
        bottom: -4px;
        width: 28px;
        height: 28px;
        border-right: 2px solid #fff;
        border-bottom: 2px solid #fff;
        transform: rotate(22deg);
      }

      @media (max-width: 720px) {
        .board {
          width: 720px;
          transform: scale(0.72);
          transform-origin: top left;
        }
      }
    </style>
  </head>
  <body>
    <main class="board">
      <div class="tip">✣ Drag to curate</div>

      <article class="polaroid sand">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=500&auto=format&fit=crop" alt="Sand ripples" />
        <strong>A4. Sand Ripples</strong>
        <span>Elemental</span>
      </article>

      <article class="polaroid fossil">
        <img src="https://images.unsplash.com/photo-1615497001839-b0a0eac3274c?q=80&w=500&auto=format&fit=crop" alt="Fossil imprint" />
        <strong>B7. Fossil Imprint</strong>
        <span>Biological</span>
      </article>

      <article class="polaroid obsidian">
        <img src="https://images.unsplash.com/photo-1528722828814-77b9b83aafb2?q=80&w=500&auto=format&fit=crop" alt="Obsidian blade" />
        <strong>C2. Obsidian Blade</strong>
        <span>Artifact</span>
      </article>

      <article class="polaroid cave">
        <img src="https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?q=80&w=500&auto=format&fit=crop" alt="Cave painting" />
        <strong>D9. Cave Painting</strong>
        <span>Cultural</span>
      </article>

      <div class="slot origins"><strong>01</strong><span>Origins</span></div>
      <div class="slot tools"><strong>03</strong><span>Tools</span></div>
      <div class="slot life"><strong>02</strong><span>Life</span></div>
      <div class="slot expression"><strong>04</strong><span>Expression</span></div>
      <div class="arrow"></div>
    </main>
  </body>
</html>
