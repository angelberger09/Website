name: Visual Tour

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: visual-tour-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-tour:
    name: Build branch and render visual walkthrough
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_VIDEO_MAX_MB: ${{ vars.DISCORD_VIDEO_MAX_MB }}

    steps:
      - name: Checkout branch under test
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Website dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build static Website for this branch
        run: npm run build

      - name: Serve built Website locally
        run: |
          npx serve out -l 4173 > /tmp/soft-strange-website-serve.log 2>&1 &
          for attempt in {1..45}; do
            if curl -fsS http://127.0.0.1:4173/Website/ > /dev/null; then
              echo "Local Website is ready."
              exit 0
            fi
            sleep 1
          done
          cat /tmp/soft-strange-website-serve.log || true
          exit 1

      - name: Fetch SoftStrange visual tools
        env:
          DEFAULT_AUDITOR_URL: https://cdn.jsdelivr.net/gh/angelberger09/Software@main/packages/SoftStrange-WebsiteAuditor/bin/SoftStrange-WebsiteAuditor.mjs
          DEFAULT_REPORTER_URL: https://raw.githubusercontent.com/angelberger09/Software-Live/Development/packages/SoftStrange-WorkflowReporter/bin/SoftStrange-WorkflowReporter.mjs
          SOFTSTRANGE_AUDITOR_URL: ${{ vars.SOFTSTRANGE_AUDITOR_URL }}
          SOFTSTRANGE_REPORTER_URL: ${{ vars.SOFTSTRANGE_REPORTER_URL }}
        run: |
          mkdir -p .agent/tools .agent/feedback/workflow-packets
          curl -fsSL "${SOFTSTRANGE_AUDITOR_URL:-$DEFAULT_AUDITOR_URL}" -o .agent/tools/SoftStrange-WebsiteAuditor.mjs
          if ! curl -fsSL "${SOFTSTRANGE_REPORTER_URL:-$DEFAULT_REPORTER_URL}" -o .agent/tools/SoftStrange-WorkflowReporter.mjs; then
            echo "Reporter download unavailable; using checked-in fallback."
            cp .github/tools/SoftStrange-WorkflowReporter.mjs .agent/tools/SoftStrange-WorkflowReporter.mjs
          fi
          test -s .agent/tools/SoftStrange-WebsiteAuditor.mjs
          test -s .agent/tools/SoftStrange-WorkflowReporter.mjs

      - name: Render scroll walkthrough and interaction simulation videos
        run: |
          node .agent/tools/SoftStrange-WebsiteAuditor.mjs \
            --base-url http://127.0.0.1:4173/Website \
            --fps 4 \
            --out .agent/visual-runs/latest \
            --routes home=/,about=/about/,notes=/notes/,portfolio=/portfolio/,store=/store/ \
            --viewports laptop:1280x720,mobile:390x844 \
            --click-selector "header a[href], nav a[href], a.home-hero-route-slip[href], a.home-door-card[href], [role='tab'], button, input, textarea, select" \
            --max-clicks 24 \
            --recovery-dir .agent/feedback/workflow-packets

      - name: Upload walkthrough videos
        id: upload_videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-tour-videos-${{ github.run_id }}-${{ github.sha }}
          path: .agent/visual-runs/latest/**/*.mp4
          if-no-files-found: ignore

      - name: Upload visual receipts and recovery packets
        id: upload_receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-tour-receipts-${{ github.run_id }}-${{ github.sha }}
          path: |
            .agent/visual-runs/latest/README.md
            .agent/visual-runs/latest/manifest.json
            .agent/visual-runs/latest/poster-home-laptop.png
            .agent/feedback/workflow-packets/*.md
          if-no-files-found: ignore

      - name: Author Discord preview package
        if: ${{ success() }}
        env:
          WORKFLOW_STATUS: ${{ job.status }}
          VIDEO_ARTIFACT_URL: ${{ steps.upload_videos.outputs.artifact-url }}
          RECEIPT_ARTIFACT_URL: ${{ steps.upload_receipts.outputs.artifact-url }}
        run: |
          MAX_MB="${DISCORD_VIDEO_MAX_MB:-20}"
          node .agent/tools/SoftStrange-WorkflowReporter.mjs \
            --mode visual-tour \
            --name "Visual Tour" \
            --status "$WORKFLOW_STATUS" \
            --summary "Rendered the Website branch with Playwright and prepared a watchable visual receipt." \
            --details "Scroll walkthrough and interaction simulation videos were generated for review." \
            --videos .agent/visual-runs/latest \
            --manifest .agent/visual-runs/latest/manifest.json \
            --preview-out /tmp/soft-strange-visual-tour-preview.mp4 \
            --max-mb "$MAX_MB" \
            --video-artifact-url "$VIDEO_ARTIFACT_URL" \
            --receipt-artifact-url "$RECEIPT_ARTIFACT_URL" \
            --message-json /tmp/soft-strange-discord-message.json \
            --github-env "$GITHUB_ENV"

      - name: Send Discord preview
        if: ${{ success() && env.DISCORD_WEBHOOK_URL != '' }}
        run: |
          if [ "$SOFTSTRANGE_HAS_DISCORD_PREVIEW" = "true" ] && [ -f "$SOFTSTRANGE_DISCORD_PREVIEW_PATH" ]; then
            PAYLOAD=$(cat "$SOFTSTRANGE_DISCORD_MESSAGE_JSON")
            curl --fail --show-error --silent --retry 5 --retry-delay 2 --retry-all-errors \
              --request POST \
              -F "payload_json=$PAYLOAD" \
              -F "files[0]=@$SOFTSTRANGE_DISCORD_PREVIEW_PATH;type=video/mp4" \
              "$DISCORD_WEBHOOK_URL" || true
          else
            curl --fail --show-error --silent --retry 5 --retry-delay 2 --retry-all-errors \
              --request POST \
              --header "Content-Type: application/json" \
              --data @"$SOFTSTRANGE_DISCORD_MESSAGE_JSON" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
