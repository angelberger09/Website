<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-label="Stacked paper sheets with grid backing and paperclip on black background">
  <defs>
    <filter id="paperNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="5" seed="57" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.90 0 0 0 0 0.84 0 0 0 0 0.70 0 0 0 .32 0" result="tone"/>
      <feComposite in="tone" in2="SourceGraphic" operator="in" result="texture"/>
      <feBlend in="SourceGraphic" in2="texture" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.62"/>
      <feDropShadow dx="12" dy="10" stdDeviation="9" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0H0V58" fill="none" stroke="#5d564e" stroke-opacity="0.22" stroke-width="2"/>
    </pattern>
    <linearGradient id="sheet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff3d3"/>
      <stop offset="0.54" stop-color="#ead9b7"/>
      <stop offset="1" stop-color="#cbb184"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" x2="1">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="0.42" stop-color="#a9a9a2"/>
      <stop offset="0.7" stop-color="#333"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1100" fill="#000"/>
  <g filter="url(#shadow)">
    <path d="M314 190 C480 184 612 206 774 188 C930 171 1086 204 1284 190 L1325 904 C1162 918 1010 898 856 918 C682 941 540 900 338 918 Z" fill="#f6f4ef" transform="rotate(-1.8 820 554)"/>
    <path d="M314 190 C480 184 612 206 774 188 C930 171 1086 204 1284 190 L1325 904 C1162 918 1010 898 856 918 C682 941 540 900 338 918 Z" fill="url(#grid)" opacity="0.52" transform="rotate(-1.8 820 554)"/>
    <path d="M438 218 C544 201 644 228 768 208 C885 190 1014 223 1188 207 C1210 324 1198 431 1216 545 C1232 653 1204 755 1220 876 C1114 874 1013 897 902 884 C760 868 632 906 472 886 C452 746 460 614 444 486 C431 370 444 286 438 218 Z" fill="url(#sheet)" filter="url(#paperNoise)" transform="rotate(1.3 830 552)"/>
    <path d="M438 218 C560 245 662 207 797 225 C937 243 1054 213 1188 207" fill="none" stroke="#fff7dc" stroke-opacity="0.38" stroke-width="5" transform="rotate(1.3 830 552)"/>
    <path d="M470 836 C584 802 678 877 792 833 C908 788 1014 872 1220 876" fill="none" stroke="#6f5a44" stroke-opacity="0.10" stroke-width="6" transform="rotate(1.3 830 552)"/>
    <path d="M578 246 C620 330 637 426 625 522 C612 622 662 712 720 860" fill="none" stroke="#6f5a44" stroke-opacity="0.09" stroke-width="5" transform="rotate(1.3 830 552)"/>
    <g transform="translate(1085 120) rotate(1.5)">
      <path d="M48 0 C87 0 104 30 104 74 L104 232 C104 303 2 303 2 232 L2 88 C2 35 79 35 79 88 L79 229 C79 263 30 263 30 229 L30 95" fill="none" stroke="#171717" stroke-width="18" stroke-linecap="round" opacity="0.32"/>
      <path d="M48 0 C87 0 104 30 104 74 L104 232 C104 303 2 303 2 232 L2 88 C2 35 79 35 79 88 L79 229 C79 263 30 263 30 229 L30 95" fill="none" stroke="url(#clip)" stroke-width="12" stroke-linecap="round"/>
      <path d="M47 12 C77 15 87 34 87 72" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
</svg>
