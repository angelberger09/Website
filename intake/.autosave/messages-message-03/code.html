<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Berger | A Diverse Creative</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

        :root {
            --bg-base: #110F18;
            --bg-surface: #1C1929;
            --text-main: #F8F8F6;
            --accent-violet: #A89BFA;
            --accent-rose: #D4A5A5;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            /* Hide default scrollbar for cinematic feel */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }

        h1, h2, h3, h4, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Paper Texture Overlay */
        .paper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            mix-blend-mode: overlay;
        }

        /* Snap Scrolling Container */
        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            scroll-snap-align: start;
            min-height: 100vh;
        }

        /* Cinematic Motion Classes */
        .animatic-establish {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(8px);
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .animatic-resolve {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        /* Home Hero Specifics */
        .hero-image-rest {
            filter: grayscale(80%) blur(4px) brightness(0.6);
            transform: scale(1.02);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .hero-container:hover .hero-image-rest {
            filter: grayscale(20%) blur(0px) brightness(0.9);
            transform: scale(1);
        }

        /* Analog Button & Polaroid Styling */
        .analog-border {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(28, 25, 41, 0.4);
            backdrop-filter: blur(12px);
        }
        
        .polaroid {
            background: #F8F8F6;
            padding: 12px 12px 48px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: #110F18;
        }
        .polaroid:hover {
            transform: scale(1.03) rotate(0deg) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Hooks ---
        function useReveal(threshold = 0.2) {
            const ref = useRef(null);
            const [revealed, setRevealed] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setRevealed(true);
                    },
                    { threshold }
                );
                if (ref.current) observer.observe(ref.current);
                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, [threshold]);

            return [ref, revealed];
        }

        // --- Components ---

        // 1. Backgrounds
        const Starfield = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let particles = [];

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 1.5;
                        this.speedY = (Math.random() * 0.2) + 0.05;
                        this.opacity = Math.random() * 0.5 + 0.1;
                    }
                    update() {
                        this.y -= this.speedY;
                        if (this.y < 0) {
                            this.y = canvas.height;
                            this.x = Math.random() * canvas.width;
                        }
                    }
                    draw() {
                        ctx.fillStyle = `rgba(168, 155, 250, ${this.opacity})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let i = 0; i < 150; i++) particles.push(new Particle());

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.update();
                        p.draw();
                    });
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 z-0 pointer-events-none" />;
        };

        const PaperTexture = () => (
            <svg className="paper-overlay" xmlns="http://www.w3.org/2000/svg">
                <filter id="noiseFilter">
                    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
                </filter>
                <rect width="100%" height="100%" filter="url(#noiseFilter)" />
            </svg>
        );

        // 2. Navigation
        const Navigation = ({ activeSection }) => {
            const links = ['Home', 'Gallery', 'Blog', 'Services', 'Products', 'Process', 'Contact'];
            
            const scrollTo = (id) => {
                const el = document.getElementById(id.toLowerCase());
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 w-[90%] md:w-auto max-w-full overflow-x-auto no-scrollbar">
                    <div className="analog-border rounded-full px-4 py-2 flex items-center gap-2 md:gap-6 shadow-2xl mx-auto w-max">
                        {links.map((link) => (
                            <button
                                key={link}
                                onClick={() => scrollTo(link)}
                                className={`text-xs md:text-sm tracking-widest uppercase px-3 py-1.5 rounded-full transition-all duration-300 ${
                                    activeSection === link.toLowerCase() 
                                    ? 'bg-white/10 text-white shadow-[inset_0_1px_2px_rgba(255,255,255,0.2)]' 
                                    : 'text-white/50 hover:text-white hover:bg-white/5'
                                }`}
                            >
                                {link}
                            </button>
                        ))}
                    </div>
                </nav>
            );
        };

        // 3. Sections
        const HomeSection = () => {
            return (
                <section id="home" className="snap-section relative w-full flex items-center justify-center overflow-hidden hero-container group cursor-default">
                    {/* Background Image */}
                    <div className="absolute inset-0 z-0">
                        <img 
                            src="https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&w=1600&q=80" 
                            alt="Atelier workspace" 
                            className="w-full h-full object-cover hero-image-rest"
                            onError={(e) => e.target.src = 'https://images.unsplash.com/photo-1558486012-817176f84c6d?auto=format&fit=crop&w=1600&q=80'}
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-[#110F18] via-[#110F18]/60 to-[#110F18]/10 transition-opacity duration-1000 group-hover:opacity-80"></div>
                    </div>

                    {/* Content */}
                    <div className="relative z-10 text-center flex flex-col items-center px-4">
                        <h1 className="text-5xl md:text-8xl font-serif text-white tracking-wide mb-6 opacity-90 drop-shadow-lg transform transition-transform duration-1000 group-hover:-translate-y-2">
                            Angel Berger
                        </h1>
                        <p className="text-sm md:text-base tracking-[0.3em] text-[#A89BFA] uppercase flex items-center gap-4 before:h-[1px] before:w-8 md:before:w-16 before:bg-[#A89BFA]/50 after:h-[1px] after:w-8 md:after:w-16 after:bg-[#A89BFA]/50 transform transition-all duration-1000 group-hover:translate-y-1">
                            A Diverse Creative
                        </p>
                    </div>
                </section>
            );
        };

        const GallerySection = () => {
            const [ref, revealed] = useReveal();
            const [activeImage, setActiveImage] = useState(null);

            const images = [
                { id: 1, url: 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?auto=format&fit=crop&w=600&q=80', title: 'Midnight Bloom', desc: 'Abstract floral study, oil on canvas.', rot: '-rotate-2' },
                { id: 2, url: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=600&q=80', title: 'Structural Silence', desc: 'Architectural photography sequence.', rot: 'rotate-3' },
                { id: 3, url: 'https://images.unsplash.com/photo-1604871000636-074fa5117945?auto=format&fit=crop&w=600&q=80', title: 'Color Theory 04', desc: 'Digital gradient exploration.', rot: '-rotate-1' },
                { id: 4, url: 'https://images.unsplash.com/photo-1506806732259-39c2d0268443?auto=format&fit=crop&w=600&q=80', title: 'Tactile Memory', desc: 'Mixed media collage.', rot: 'rotate-2' },
            ];

            return (
                <section id="gallery" className="snap-section relative w-full flex flex-col items-center justify-center py-24 px-6 md:px-12 z-10" ref={ref}>
                    <div className={`max-w-6xl w-full animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-serif text-white mb-2">Selected Works</h2>
                            <p className="text-[#A89BFA] text-sm tracking-widest uppercase">Visual Gallery</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 md:gap-4 place-items-center">
                            {images.map((img, idx) => (
                                <button 
                                    key={img.id}
                                    onClick={() => setActiveImage(img)}
                                    className={`polaroid w-64 md:w-full max-w-[280px] ${img.rot} focus:outline-none`}
                                    style={{ transitionDelay: `${idx * 100}ms` }}
                                >
                                    <div className="aspect-[4/5] w-full overflow-hidden mb-4 bg-gray-200">
                                        <img src={img.url} alt={img.title} className="w-full h-full object-cover grayscale-[30%] hover:grayscale-0 transition-all duration-500" />
                                    </div>
                                    <p className="font-serif text-lg text-center font-medium">{img.title}</p>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    {activeImage && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#110F18]/90 backdrop-blur-md" onClick={() => setActiveImage(null)}>
                            <div className="polaroid max-w-lg w-full scale-100 rotate-0 cursor-default" onClick={e => e.stopPropagation()}>
                                <div className="aspect-[4/5] w-full overflow-hidden mb-6">
                                    <img src={activeImage.url} alt={activeImage.title} className="w-full h-full object-cover" />
                                </div>
                                <h3 className="font-serif text-2xl text-center mb-2">{activeImage.title}</h3>
                                <p className="text-center text-gray-600 font-sans text-sm">{activeImage.desc}</p>
                                <button 
                                    onClick={() => setActiveImage(null)}
                                    className="mt-6 mx-auto block px-6 py-2 border border-gray-300 rounded-full text-xs tracking-widest uppercase hover:bg-gray-100 transition-colors"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        const BlogSection = () => {
            const [ref, revealed] = useReveal();
            const posts = [
                { id: 1, cat: 'Studio Diary', title: 'Finding warmth in brutalist spaces', img: 'https://images.unsplash.com/photo-1507459813284-0a3dbf69dff4?auto=format&fit=crop&w=400&q=80' },
                { id: 2, cat: 'Process', title: 'The importance of analog mistakes', img: 'https://images.unsplash.com/photo-1516086259021-081822cb54c2?auto=format&fit=crop&w=400&q=80' },
                { id: 3, cat: 'Inspiration', title: 'Light studies across three cities', img: 'https://images.unsplash.com/photo-1542039233-04dc3e5d03bb?auto=format&fit=crop&w=400&q=80' }
            ];

            return (
                <section id="blog" className="snap-section relative w-full flex items-center justify-center py-24 px-6 md:px-12 z-10" ref={ref}>
                     <div className={`max-w-5xl w-full animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 border-b border-white/10 pb-4">
                            <div>
                                <h2 className="text-3xl md:text-4xl font-serif text-white mb-2">Visual Journal</h2>
                                <p className="text-[#A89BFA] text-sm tracking-widest uppercase">Thoughts & Observations</p>
                            </div>
                            <button className="text-sm mt-4 md:mt-0 text-white/50 hover:text-white transition-colors tracking-widest uppercase">View Archive →</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {posts.map(post => (
                                <article key={post.id} className="group cursor-pointer">
                                    <div className="aspect-[3/4] w-full overflow-hidden rounded-sm mb-4">
                                        <img src={post.img} alt={post.title} className="w-full h-full object-cover scale-100 group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100" />
                                    </div>
                                    <span className="text-xs text-[#D4A5A5] tracking-widest uppercase block mb-2">{post.cat}</span>
                                    <h3 className="font-serif text-xl text-white group-hover:text-[#A89BFA] transition-colors">{post.title}</h3>
                                </article>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ServicesSection = () => {
            const [ref, revealed] = useReveal();
            const services = [
                { title: 'Art Direction', desc: 'Guiding the visual language and conceptual tone of a project from inception to execution.', icon: <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1" fill="none"/> },
                { title: 'Photography', desc: 'Capturing spaces, objects, and people with a cinematic, narrative-driven approach.', icon: <><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="1" fill="none"/><circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="1" fill="none"/></> },
                { title: 'Visual Identity', desc: 'Crafting cohesive brand ecosystems that feel human, textured, and deeply resonant.', icon: <path d="M12 2L2 22h20L12 2z" stroke="currentColor" strokeWidth="1" fill="none"/> }
            ];

            return (
                <section id="services" className="snap-section relative w-full flex items-center justify-center py-24 px-6 md:px-12 z-10" ref={ref}>
                    <div className={`max-w-4xl w-full text-center animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                         <h2 className="text-3xl md:text-4xl font-serif text-white mb-2">Capabilities</h2>
                         <p className="text-[#A89BFA] text-sm tracking-widest uppercase mb-16">Services & Focus</p>

                         <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                             {services.map((svc, idx) => (
                                 <div key={idx} className="flex flex-col items-center text-center group">
                                     <div className="w-16 h-16 rounded-full analog-border flex items-center justify-center text-[#A89BFA] mb-6 group-hover:scale-110 group-hover:bg-white/5 transition-all duration-500">
                                        <svg width="24" height="24" viewBox="0 0 24 24" className="opacity-70 group-hover:opacity-100 transition-opacity">
                                            {svc.icon}
                                        </svg>
                                     </div>
                                     <h3 className="font-serif text-xl text-white mb-4">{svc.title}</h3>
                                     <p className="text-white/60 font-light leading-relaxed text-sm">{svc.desc}</p>
                                 </div>
                             ))}
                         </div>
                    </div>
                </section>
            );
        };

        const ProductsSection = () => {
            const [ref, revealed] = useReveal();
            const products = [
                { id: 1, name: 'The Studio Preset Pack', detail: 'Digital Asset · 12 Looks', img: 'https://images.unsplash.com/photo-1541845157-a56defce3b03?auto=format&fit=crop&w=400&q=80' },
                { id: 2, name: 'Textures Vol. 01', detail: 'High-Res Scans · Paper & Film', img: 'https://images.unsplash.com/photo-1586075010923-2dd4570fb338?auto=format&fit=crop&w=400&q=80' }
            ];

            return (
                <section id="products" className="snap-section relative w-full flex items-center justify-center py-24 px-6 md:px-12 z-10" ref={ref}>
                    <div className={`max-w-5xl w-full animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-serif text-white mb-2">Editions</h2>
                            <p className="text-[#A89BFA] text-sm tracking-widest uppercase">Digital & Physical Goods</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16">
                            {products.map(product => (
                                <div key={product.id} className="analog-border rounded-lg p-4 group flex flex-col sm:flex-row gap-6 items-center hover:bg-white/[0.02] transition-colors">
                                    <div className="w-full sm:w-48 aspect-square overflow-hidden rounded-md flex-shrink-0">
                                        <img src={product.img} alt={product.name} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" />
                                    </div>
                                    <div className="flex-grow text-center sm:text-left flex flex-col justify-center pb-4 sm:pb-0">
                                        <span className="text-[#D4A5A5] text-xs tracking-widest uppercase mb-2 block">{product.detail}</span>
                                        <h3 className="font-serif text-2xl text-white mb-6">{product.name}</h3>
                                        <button className="self-center sm:self-start px-6 py-2 rounded-full border border-white/20 text-xs tracking-widest uppercase text-white hover:bg-white hover:text-[#110F18] transition-all">
                                            View Details
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ProcessSection = () => {
            const [ref, revealed] = useReveal();
            const steps = [
                { num: '01', title: 'Plan', desc: 'Define the creative direction, visual goal, constraints, and intended feeling.' },
                { num: '02', title: 'Randomize', desc: 'Explore unexpected variations, references, colors, compositions, and visual possibilities.' },
                { num: '03', title: 'Extract', desc: 'Identify the strongest patterns, useful ideas, and visual directions from the exploration.' },
                { num: '04', title: 'Execute', desc: 'Build the final piece, refine the details, and turn the selected direction into finished work.' },
            ];

            return (
                <section id="process" className="snap-section relative w-full flex items-center justify-center py-24 px-6 md:px-12 z-10" ref={ref}>
                    <div className={`max-w-6xl w-full animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                        <div className="text-center mb-20">
                            <h2 className="text-3xl md:text-4xl font-serif text-white mb-2">Creative Process</h2>
                            <p className="text-[#A89BFA] text-sm tracking-widest uppercase">The Methodology</p>
                        </div>

                        <div className="flex flex-col md:flex-row gap-8 md:gap-0 relative">
                            {/* Connecting Line (Desktop) */}
                            <div className="hidden md:block absolute top-8 left-12 right-12 h-[1px] bg-white/10 z-0"></div>
                            
                            {steps.map((step, idx) => (
                                <div key={idx} className="flex-1 relative z-10 flex flex-col md:items-center group">
                                    <div className="flex items-center md:justify-center mb-6">
                                        <div className="w-16 h-16 rounded-full bg-[#1C1929] border border-white/10 flex items-center justify-center text-[#A89BFA] font-serif text-xl shadow-lg group-hover:scale-110 group-hover:border-[#A89BFA]/50 transition-all duration-500">
                                            {step.num}
                                        </div>
                                    </div>
                                    <div className="md:text-center pr-4 md:pr-0">
                                        <h3 className="font-serif text-xl text-white mb-3">{step.title}</h3>
                                        <p className="text-white/60 font-light text-sm leading-relaxed max-w-[240px] mx-auto">{step.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ContactSection = () => {
            const [ref, revealed] = useReveal();

            return (
                <section id="contact" className="snap-section relative w-full flex items-center justify-center py-24 px-6 md:px-12 z-10 pb-40" ref={ref}>
                    <div className={`max-w-xl w-full animatic-establish ${revealed ? 'animatic-resolve' : ''}`}>
                         <div className="analog-border rounded-2xl p-8 md:p-12 relative overflow-hidden">
                            {/* Subtle ambient light inside panel */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-[#A89BFA]/5 blur-3xl pointer-events-none"></div>
                            
                            <div className="text-center mb-10 relative z-10">
                                <h2 className="text-3xl font-serif text-white mb-2">Start a Dialogue</h2>
                                <p className="text-white/50 text-sm">For commissions, collaborations, or inquiries.</p>
                            </div>

                            <form className="flex flex-col gap-6 relative z-10" onSubmit={(e) => e.preventDefault()}>
                                <div>
                                    <label htmlFor="name" className="sr-only">Name</label>
                                    <input type="text" id="name" placeholder="Your Name" className="w-full bg-transparent border-b border-white/20 px-0 py-3 text-white placeholder-white/30 focus:outline-none focus:border-[#A89BFA] transition-colors rounded-none" />
                                </div>
                                <div>
                                    <label htmlFor="email" className="sr-only">Email</label>
                                    <input type="email" id="email" placeholder="Email Address" className="w-full bg-transparent border-b border-white/20 px-0 py-3 text-white placeholder-white/30 focus:outline-none focus:border-[#A89BFA] transition-colors rounded-none" />
                                </div>
                                <div>
                                    <label htmlFor="message" className="sr-only">Message</label>
                                    <textarea id="message" rows="3" placeholder="Project Details" className="w-full bg-transparent border-b border-white/20 px-0 py-3 text-white placeholder-white/30 focus:outline-none focus:border-[#A89BFA] transition-colors resize-none rounded-none"></textarea>
                                </div>
                                <button type="submit" className="mt-4 w-full py-4 rounded-sm bg-white text-[#110F18] font-medium tracking-widest uppercase text-xs hover:bg-[#A89BFA] transition-colors">
                                    Send Message
                                </button>
                            </form>

                            <div className="mt-12 pt-8 border-t border-white/10 flex justify-center gap-8 relative z-10">
                                <a href="#" className="text-xs tracking-widest uppercase text-white/50 hover:text-white transition-colors">Instagram</a>
                                <a href="#" className="text-xs tracking-widest uppercase text-white/50 hover:text-white transition-colors">Behance</a>
                                <a href="#" className="text-xs tracking-widest uppercase text-white/50 hover:text-white transition-colors">Twitter</a>
                            </div>
                         </div>
                    </div>
                </section>
            );
        };

        // 4. Main App
        const App = () => {
            const [activeSection, setActiveSection] = useState('home');
            
            // Sync nav with scroll position
            useEffect(() => {
                const handleScroll = () => {
                    const sections = document.querySelectorAll('.snap-section');
                    let current = '';
                    sections.forEach(section => {
                        const sectionTop = section.offsetTop;
                        // Use a slightly offset threshold for better active state switching
                        if (scrollY >= sectionTop - window.innerHeight / 3) {
                            current = section.getAttribute('id');
                        }
                    });
                    if (current) setActiveSection(current);
                };

                const container = document.querySelector('.snap-container') || window;
                container.addEventListener('scroll', handleScroll);
                return () => container.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="relative bg-[#110F18] min-h-screen text-[#F8F8F6] selection:bg-[#A89BFA] selection:text-white">
                    <Starfield />
                    <PaperTexture />
                    
                    {/* Add a subtle radial gradient overlay over the whole page to anchor the dark theme */}
                    <div className="fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-[#110F18]/80 to-[#110F18] pointer-events-none"></div>

                    <Navigation activeSection={activeSection} />

                    <main className="snap-container relative z-10 h-screen overflow-y-scroll overflow-x-hidden">
                        <HomeSection />
                        <GallerySection />
                        <BlogSection />
                        <ServicesSection />
                        <ProductsSection />
                        <ProcessSection />
                        <ContactSection />
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
